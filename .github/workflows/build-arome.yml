name: Build GeoSphere AROME weather tiles

on:
  workflow_dispatch:
    inputs:
      forecast_offset:
        description: 0 = newest run, 1 = previous run
        required: true
        default: '0'

concurrency:
  group: geosphere-arome-weather-build
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORECAST_OFFSET: ${{ inputs.forecast_offset }}
    outputs:
      tag: ${{ steps.probe.outputs.tag }}
      reference_time: ${{ steps.probe.outputs.reference_time }}
    steps:
      - name: Probe newest model run
        id: probe
        env:
          METADATA_URL: https://dataset.api.hub.geosphere.at/v1/grid/forecast/nwp-v1-1h-2500m/metadata
        run: |
          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors \
            --connect-timeout 30 --max-time 120 \
            "$METADATA_URL" \
            --output metadata.json

          python3 - <<'PY'
          from datetime import datetime, timezone
          import json
          import os

          with open('metadata.json', encoding='utf-8') as handle:
          	metadata = json.load(handle)

          reference_times = (
          	metadata.get('available_forecast_reftimes')
          	or metadata.get('availableForecastReftimes')
          )
          if not isinstance(reference_times, list) or not reference_times:
          	last_reference_time = (
          		metadata.get('last_forecast_reftime')
          		or metadata.get('lastForecastReftime')
          	)
          	if last_reference_time is None:
          		raise RuntimeError('GeoSphere-Metadaten enthalten keine Forecast-Referenzzeit.')
          	reference_times = [last_reference_time]

          forecast_offset = int(os.environ['FORECAST_OFFSET'])
          if forecast_offset < 0 or forecast_offset >= len(reference_times):
          	raise RuntimeError(
          		f'forecast_offset={forecast_offset} ist ungültig; '
          		f'verfügbar sind 0 bis {len(reference_times) - 1}.'
          	)

          raw_reference_time = str(reference_times[forecast_offset]).strip()
          parsed_reference_time = datetime.fromisoformat(
          	raw_reference_time[:-1] + '+00:00'
          	if raw_reference_time.endswith('Z')
          	else raw_reference_time
          )
          if parsed_reference_time.tzinfo is None:
          	parsed_reference_time = parsed_reference_time.replace(tzinfo=timezone.utc)
          parsed_reference_time = parsed_reference_time.astimezone(timezone.utc)

          reference_time = parsed_reference_time.strftime('%Y-%m-%dT%H:%M:%SZ')
          tag = f"arome-{parsed_reference_time:%Y%m%dT%H%MZ}"

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
          	handle.write(f'tag={tag}\n')
          	handle.write(f'reference_time={reference_time}\n')

          print(f'Neuester ausgewählter GeoSphere-Lauf: {tag}')
          PY

  build:
    needs: probe
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      FORECAST_OFFSET: ${{ inputs.forecast_offset }}
      TAG: ${{ needs.probe.outputs.tag }}
      REFERENCE_TIME: ${{ needs.probe.outputs.reference_time }}
      PMTILES_BIN: ${{ github.workspace }}/.local/bin/pmtiles
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python package
        run: python -m pip install --upgrade pip && python -m pip install '.[dev]'

      - name: Run unit tests
        run: pytest -q

      - name: Install pinned PMTiles CLI
        run: |
          mkdir -p "$(dirname "$PMTILES_BIN")"
          curl -fsSL \
            https://github.com/protomaps/go-pmtiles/releases/download/v1.30.1/go-pmtiles_1.30.1_Linux_x86_64.tar.gz \
            | tar -xz -C "$(dirname "$PMTILES_BIN")" pmtiles
          "$PMTILES_BIN" version

      - name: Build numerical raster PMTiles
        run: |
          /usr/bin/time -v python -m weather_build build \
            --reference-time "$REFERENCE_TIME" \
            --work-directory work \
            --output-directory out \
            --pmtiles-binary "$PMTILES_BIN"

      - name: Verify all PMTiles archives
        run: |
          mapfile -t FILES < <(find out -maxdepth 1 -type f -name '*.pmtiles' -print | sort)
          test "${#FILES[@]}" -gt 0

          EXPECTED_COUNT="$(python3 -c 'import json; print(int(json.load(open("out/validation.json", encoding="utf-8"))["asset_count"]))')"

          if [ "${#FILES[@]}" -ne "$EXPECTED_COUNT" ]; then
            echo "PMTiles count mismatch: ${#FILES[@]} files, ${EXPECTED_COUNT} expected." >&2
            exit 1
          fi

          for FILE in "${FILES[@]}"; do
            echo "Verify ${FILE}"
            "$PMTILES_BIN" verify "$FILE"
          done

      - name: Upload diagnostic source artifact
        id: diagnostic-artifact
        uses: actions/upload-artifact@v7
        with:
          name: arome-source-${{ env.TAG }}
          path: |
            work/source/*.nc
            out/manifest.json
            out/validation.json
          retention-days: 3
          if-no-files-found: error

      - name: Install Easyname upload dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Make Easyname base-directory creation idempotent
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/upload-easyname.sh')
          content = path.read_text(encoding='utf-8')
          old = 'set net:reconnect-interval-base 5\nmkdir -p "$REMOTE_BASE"\n'
          new = (
          	'set net:reconnect-interval-base 5\n'
          	'set cmd:fail-exit no\n'
          	'mkdir -p "$REMOTE_BASE"\n'
          	'set cmd:fail-exit yes\n'
          )
          if old not in content:
          	raise RuntimeError('Erwartete Easyname-mkdir-Stelle wurde nicht gefunden.')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Upload complete run to Easyname
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER }}
          PASS: ${{ secrets.PASS }}
          LOCAL_DIR: out
          REMOTE_BASE: Wetter/AROME
          RETAINED_RUNS: '3'
        run: bash scripts/upload-easyname.sh

      - name: Delete diagnostic source artifact after successful build
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ steps.diagnostic-artifact.outputs.artifact-id }}
        run: gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}"
